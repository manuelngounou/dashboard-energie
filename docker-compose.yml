version: '3.8'

services:
  # Service PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    environment:
      POSTGRES_DB: dashboard_energie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - dashboard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard_energie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Backend (PHP)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dashboard_energie
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5000:80"
    networks:
      - dashboard-network
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html

  # Service Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dashboard-frontend
    ports:
      - "8082:80"
    networks:
      - dashboard-network
    depends_on:
      - backend

# Volumes persistants
volumes:
  postgres_data:
    driver: local

# Réseau commun pour la communication entre services
networks:
  dashboard-network:
    driver: bridge