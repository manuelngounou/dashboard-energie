
apiVersion: v1
kind: Service
metadata:
  name: backend-service     # Le frontend utilisera ce nom pour contacter l'API
  namespace: dashboard
spec:
  selector:
    app: backend             # Redirige vers les Pods labellisés "app: backend"

  ports:
    - port: 80               # Port du Service
      targetPort: 80         # Port d'Apache dans le conteneur

  type: ClusterIP            # Accessible uniquement dans le cluster (pas de l'extérieur)
