
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret   # Nom du secret (les autres fichiers l'utiliseront)
  namespace: dashboard    # Dans quel namespace on le range
type: Opaque              # Type générique (données quelconques)
data:
  # Chaque valeur est encodée en base64
  # "postgres" encodé en base64 = cG9zdGdyZXM=
  POSTGRES_USER:     cG9zdGdyZXM=

  # "postgres" encodé en base64 = cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=

  # "dashboard_energie" encodé en base64
  POSTGRES_DB:       ZGFzaGJvYXJkX2VuZXJnaWU=
