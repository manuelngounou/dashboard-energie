<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Énergie</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 id="welcome-message"></h1>

    <!-- Section Statistiques -->
    <section class="stats">
        <div class="card">
            <h2>Total kWh consommés</h2>
            <p id="total-kwh">--</p>
        </div>

        <div class="card">
            <h2>Moyenne kWh</h2>
            <p id="moyenne-kwh">--</p>
        </div>
    </section>

    <!-- Section Consommations -->
    <section>
        <h2>Liste des consommations</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>kWh</th>
                    <th>Appareil</th>
                    <th>Commentaire</th>
                </tr>
            </thead>
            <tbody id="table-consommations"></tbody>
        </table>
    </section>

    <script src="app.js"></script>
</body>
</html>
